name: Release ownstackctl

on:
  push:
    tags:
      - "ownstackctl-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/ownstackctl-${GOOS}-${GOARCH}" ./cmd/ownstackctl
      - name: Checksums
        run: |
          cd dist
          sha256sum ownstackctl-* > "checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
